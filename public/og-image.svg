  <!-- Accent glow -->
  <circle cx="950" cy="315" r="250" fill="#FF6A00" opacity="0.06"/>

  <!-- Logo icon (R letter) -->
  <g transform="translate(80, 200)">
    <rect width="80" height="80" rx="18" fill="#FF6A00"/>
    <path d="M 27 20 L 50 20 C 58 20 63 25 63 33 C 63 39 58 43 52 45 L 64 62 L 52 62 L 40 45 L 37 45 L 37 62 L 27 62 Z M 37 28 L 37 38 L 48 38 C 52 38 54 36 54 33 C 54 30 52 28 48 28 Z" fill="#FFFFFF"/>
  </g>

  <!-- Brand name -->
  <text x="180" y="258" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-size="52" font-weight="900" fill="#FFFFFF" letter-spacing="-1">Recruitment<tspan fill="#FF6A00">OS</tspan></text>

  <!-- Tagline -->
  <text x="82" y="340" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-size="36" font-weight="600" fill="#FFFFFF" opacity="0.95">The Automated Lead Engine</text>
  <text x="82" y="390" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-size="36" font-weight="600" fill="#FF6A00">for Recruiting Agencies</text>

  <!-- Stats bar -->
  <g transform="translate(82, 450)">
    <rect width="220" height="72" rx="12" fill="#FFFFFF" opacity="0.08"/>
    <text x="20" y="32" font-family="Inter, sans-serif" font-size="24" font-weight="800" fill="#FFFFFF">6.3%</text>
    <text x="20" y="56" font-family="Inter, sans-serif" font-size="13" fill="#FFFFFF" opacity="0.5" letter-spacing="1" text-transform="uppercase">AVG REPLY RATE</text>

    <rect x="250" width="220" height="72" rx="12" fill="#FFFFFF" opacity="0.08"/>
    <text x="270" y="32" font-family="Inter, sans-serif" font-size="24" font-weight="800" fill="#FFFFFF">1M+</text>
    <text x="270" y="56" font-family="Inter, sans-serif" font-size="13" fill="#FFFFFF" opacity="0.5" letter-spacing="1">JOBS SCRAPED</text>

    <rect x="500" width="220" height="72" rx="12" fill="#FFFFFF" opacity="0.08"/>
    <text x="520" y="32" font-family="Inter, sans-serif" font-size="24" font-weight="800" fill="#FFFFFF">5x</text>
    <text x="520" y="56" font-family="Inter, sans-serif" font-size="13" fill="#FFFFFF" opacity="0.5" letter-spacing="1">MORE PLACEMENTS</text>
  </g>

  <!-- Bottom accent line -->
  <rect x="0" y="620" width="1200" height="10" fill="url(#accent)"/>
